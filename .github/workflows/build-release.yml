name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Se activa al hacer: git tag v1.0 && git push --tags

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Buildear .exe
        run: pyinstaller lidar_pcap_getter.spec

      - name: Preparar paquete
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release_windows/config -Force
          Copy-Item dist/lidar_pcap_getter.exe release_windows/
          Copy-Item config/.env.example release_windows/config/.env.example

      - uses: actions/upload-artifact@v4
        with:
          name: lidar_pcap_getter_windows
          path: release_windows/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Buildear binario
        run: pyinstaller lidar_pcap_getter.spec

      - name: Preparar paquete
        run: |
          mkdir -p release_linux/config
          cp dist/lidar_pcap_getter release_linux/
          cp config/.env.example release_linux/config/.env.example
          chmod +x release_linux/lidar_pcap_getter

      - uses: actions/upload-artifact@v4
        with:
          name: lidar_pcap_getter_linux
          path: release_linux/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lidar_pcap_getter_windows
          path: windows/

      - uses: actions/download-artifact@v4
        with:
          name: lidar_pcap_getter_linux
          path: linux/

      - name: Empaquetar
        run: |
          cd windows && zip -r ../lidar_pcap_getter_windows.zip . && cd ..
          cd linux   && zip -r ../lidar_pcap_getter_linux.zip   . && cd ..

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lidar_pcap_getter_windows.zip
            lidar_pcap_getter_linux.zip
          body: |
            ## Instalación
            1. Descargar el zip según tu OS
            2. Descomprimir
            3. Renombrar `config/.env.example` → `config/.env` y completar credenciales
            4. Ejecutar `lidar_pcap_getter.exe 15000 S2160:RIGHT`

name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Se activa al hacer: git tag v1.0 && git push --tags

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Buildear .exe
        run: pyinstaller lidar_pcap_getter.spec

      - name: Preparar y empaquetar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path pkg/config -Force
          Copy-Item dist/lidar_pcap_getter.exe pkg/
          Copy-Item config/.env.example pkg/config/
          Get-ChildItem -Recurse pkg
          Compress-Archive -Path pkg/* -DestinationPath lidar_pcap_getter_windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: lidar_pcap_getter_windows
          path: lidar_pcap_getter_windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Buildear binario
        run: pyinstaller lidar_pcap_getter.spec

      - name: Preparar y empaquetar
        run: |
          mkdir -p pkg/config
          cp dist/lidar_pcap_getter pkg/
          cp config/.env.example pkg/config/
          chmod +x pkg/lidar_pcap_getter
          cd pkg && zip -r ../lidar_pcap_getter_linux.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: lidar_pcap_getter_linux
          path: lidar_pcap_getter_linux.zip

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lidar_pcap_getter_windows

      - uses: actions/download-artifact@v4
        with:
          name: lidar_pcap_getter_linux

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lidar_pcap_getter_windows.zip
            lidar_pcap_getter_linux.zip
          body: |
            ## Instalación
            1. Descargar el zip según tu OS
            2. Descomprimir
            3. Renombrar `config/.env.example` → `config/.env` y completar credenciales
            4. Ejecutar `lidar_pcap_getter.exe 15000 S2160:RIGHT`
